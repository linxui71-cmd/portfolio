<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 提示词生成器</title>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root {
      --bg: #0a0a0b; --bg-card: rgba(255,255,255,0.04); --bg-card-hover: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.07); --border-hover: rgba(255,255,255,0.14);
      --border-focus: rgba(139,92,246,0.5); --fg: #f5f5f7; --fg-muted: rgba(255,255,255,0.5);
      --fg-dim: rgba(255,255,255,0.25); --accent-1: #6366f1; --accent-2: #a855f7;
      --success: #22c55e; --radius-sm: 8px; --radius-md: 14px; --radius-lg: 18px;
      --max-w: 660px; --ease: cubic-bezier(0.25,0.46,0.45,0.94); --spring: cubic-bezier(0.34,1.56,0.64,1);
    }
    html{font-size:16px}
    body {
      background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"PingFang SC","Noto Sans SC","Microsoft YaHei",sans-serif;
      color:var(--fg);line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100dvh;
      display:flex;flex-direction:column;align-items:center;padding:40px 20px 60px;position:relative;overflow-x:hidden
    }
    .orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0}
    .orb-1{width:500px;height:500px;background:rgba(99,102,241,0.07);top:-15%;left:-10%;animation:o1 18s ease-in-out infinite alternate}
    .orb-2{width:400px;height:400px;background:rgba(168,85,247,0.06);bottom:-10%;right:-8%;animation:o2 22s ease-in-out infinite alternate}
    .orb-3{width:300px;height:300px;background:rgba(139,92,246,0.04);top:45%;left:55%;animation:o3 15s ease-in-out infinite alternate}
    @keyframes o1{0%{transform:translate(0,0)}100%{transform:translate(90px,70px)}}
    @keyframes o2{0%{transform:translate(0,0)}100%{transform:translate(-70px,-90px)}}
    @keyframes o3{0%{transform:translate(0,0)}100%{transform:translate(60px,-50px)}}
    .grid-overlay{
      position:fixed;inset:0;z-index:0;pointer-events:none;
      background-image:linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);
      background-size:48px 48px
    }
    .container{position:relative;z-index:1;width:100%;max-width:var(--max-w)}
    .header{text-align:center;margin-bottom:48px;animation:fd 0.8s var(--ease) both}
    .logo{display:inline-flex;align-items:center;justify-content:center;width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,var(--accent-1),var(--accent-2));margin-bottom:20px;box-shadow:0 8px 32px rgba(99,102,241,0.25);transition:transform 0.3s var(--spring),box-shadow 0.3s var(--ease)}
    .logo:hover{transform:scale(1.06) rotate(-2deg);box-shadow:0 12px 40px rgba(99,102,241,0.35)}
    .logo svg{width:26px;height:26px;color:#fff}
    .header h1{font-size:clamp(1.6rem,4vw,2.2rem);font-weight:700;letter-spacing:-0.025em;background:linear-gradient(135deg,#e2e8f0,#a78bfa,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
    .header p{font-size:0.92rem;color:var(--fg-muted)}
    @keyframes fd{from{opacity:0;transform:translateY(-18px)}to{opacity:1;transform:translateY(0)}}
    .card{background:var(--bg-card);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px 32px;transition:border-color 0.3s,box-shadow 0.3s;animation:fu 0.6s 0.15s var(--ease) both}
    .card:focus-within{border-color:var(--border-focus);box-shadow:0 0 0 1px rgba(139,92,246,0.15),0 8px 32px rgba(99,102,241,0.06)}
    @keyframes fu{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .form-group{margin-bottom:20px}.form-group:last-of-type{margin-bottom:24px}
    .form-label{display:flex;align-items:center;gap:7px;font-size:0.82rem;font-weight:500;color:var(--fg-muted);margin-bottom:8px}
    .form-label svg{width:15px;height:15px;opacity:0.6}
    textarea{width:100%;min-height:100px;padding:14px 16px;border-radius:var(--radius-sm);background:rgba(255,255,255,0.03);border:1px solid var(--border);color:var(--fg);font-size:0.92rem;font-family:inherit;line-height:1.6;resize:vertical;transition:border-color 0.25s,box-shadow 0.25s,background 0.25s;outline:none}
    textarea::placeholder{color:var(--fg-dim)}
    textarea:focus{border-color:var(--border-focus);background:rgba(255,255,255,0.05);box-shadow:0 0 0 1px rgba(139,92,246,0.12)}
    .select-wrap{position:relative}
    .select-wrap::after{content:'';position:absolute;right:14px;top:50%;transform:translateY(-50%);width:10px;height:10px;border-right:2px solid var(--fg-dim);border-bottom:2px solid var(--fg-dim);pointer-events:none;rotate:45deg;margin-top:-3px}
    select{width:100%;padding:12px 38px 12px 14px;border-radius:var(--radius-sm);background:rgba(255,255,255,0.03);border:1px solid var(--border);color:var(--fg);font-size:0.9rem;font-family:inherit;appearance:none;cursor:pointer;outline:none;transition:border-color 0.25s,box-shadow 0.25s,background 0.25s}
    select:hover{border-color:var(--border-hover);background:var(--bg-card-hover)}
    select:focus{border-color:var(--border-focus);box-shadow:0 0 0 1px rgba(139,92,246,0.12)}
    select option{background:#1a1a1d;color:var(--fg)}
    .btn{position:relative;display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 32px;border-radius:9999px;font-size:0.92rem;font-weight:500;font-family:inherit;cursor:pointer;border:none;background:linear-gradient(135deg,var(--accent-1),var(--accent-2));color:#fff;transition:transform 0.3s var(--spring),box-shadow 0.3s var(--ease),opacity 0.3s;user-select:none;-webkit-tap-highlight-color:transparent;overflow:hidden}
    .btn::before{content:'';position:absolute;inset:0;border-radius:inherit;background:linear-gradient(135deg,var(--accent-2),var(--accent-1));opacity:0;transition:opacity 0.35s}
    .btn>*{position:relative;z-index:1}
    .btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(99,102,241,0.3)}
    .btn:hover::before{opacity:1}
    .btn:active{transform:translateY(0) scale(0.97);box-shadow:0 4px 16px rgba(99,102,241,0.2)}
    .btn:disabled{opacity:0.4;cursor:not-allowed;transform:none!important;box-shadow:none!important}
    .btn svg{width:18px;height:18px;transition:transform 0.4s var(--spring)}
    .btn:hover svg{transform:rotate(-8deg) scale(1.1)}
    .btn-full{width:100%}
    .spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,0.25);border-top-color:#fff;border-radius:50%;animation:spin 0.65s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .result-card{margin-top:24px;background:var(--bg-card);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;animation:ri 0.5s var(--spring) both;display:none}
    .result-card.visible{display:block}
    @keyframes ri{from{opacity:0;transform:translateY(16px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
    .result-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border)}
    .result-header-left{display:flex;align-items:center;gap:8px;font-size:0.82rem;font-weight:500;color:var(--fg-muted)}
    .result-dot{width:6px;height:6px;border-radius:50%;background:var(--success);animation:pulse 2s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
    .result-actions{display:flex;gap:6px}
    .icon-btn{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:var(--radius-sm);background:transparent;border:1px solid transparent;color:var(--fg-muted);cursor:pointer;transition:background 0.25s,border-color 0.25s,color 0.25s,transform 0.25s var(--spring);-webkit-tap-highlight-color:transparent}
    .icon-btn:hover{background:var(--bg-card-hover);border-color:var(--border-hover);color:var(--fg);transform:scale(1.08)}
    .icon-btn:active{transform:scale(0.92)}
    .icon-btn svg{width:17px;height:17px}
    .icon-btn.copied{color:var(--success);border-color:rgba(34,197,94,0.2);background:rgba(34,197,94,0.06)}
    .result-body{padding:22px 24px;font-size:0.92rem;line-height:1.75;color:var(--fg);white-space:pre-wrap;word-break:break-word}
    .result-body .tag{display:inline-block;font-size:0.68rem;font-weight:600;padding:2px 10px;border-radius:9999px;background:rgba(99,102,241,0.1);color:var(--accent-1);border:1px solid rgba(99,102,241,0.15);margin-bottom:12px}
    .regen-row{display:flex;gap:10px;margin-top:14px;animation:fu 0.4s 0.1s var(--ease) both}
    .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--fg-muted);font-size:0.85rem;padding:10px 22px}
    .btn-ghost::before{display:none}
    .btn-ghost:hover{background:var(--bg-card-hover);border-color:var(--border-hover);color:var(--fg);box-shadow:0 6px 20px rgba(0,0,0,0.2)}
    .btn-ghost:active{transform:translateY(0) scale(0.97)}
    .footer{margin-top:48px;text-align:center;font-size:0.72rem;color:var(--fg-dim);animation:fu 0.8s 0.4s var(--ease) both}
    .footer span{color:var(--accent-1)}
    .toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(80px);background:rgba(34,197,94,0.12);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(34,197,94,0.2);border-radius:9999px;padding:10px 22px;font-size:0.85rem;color:var(--success);z-index:100;opacity:0;transition:transform 0.5s var(--spring),opacity 0.4s var(--ease);pointer-events:none;white-space:nowrap}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    @media(max-width:600px){
      body{padding:24px 16px 40px}.header{margin-bottom:32px}.header h1{font-size:1.4rem}
      .logo{width:44px;height:44px}.logo svg{width:22px;height:22px}
      .card{padding:20px;border-radius:var(--radius-md)}
      .result-body{padding:16px 18px;font-size:0.88rem}
      .result-header{padding:11px 16px;flex-wrap:wrap;gap:8px}
      .regen-row{flex-direction:column}.regen-row .btn{width:100%}
      textarea{min-height:80px;font-size:0.88rem}
      .toast{font-size:0.8rem;padding:8px 16px;bottom:24px}
    }
    @media(max-width:380px){.card{padding:16px}.header h1{font-size:1.2rem}}
    ::-webkit-scrollbar{width:6px}
    ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:3px}
  </style>
</head>
<body><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div>
<div class="grid-overlay"></div>
<div class="toast" id="toast">复制成功！</div>
<div class="container">
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3a3 3 0 0 0-3 3v12a3 3 0 0 0 3 3"/><path d="M6 9a3 3 0 0 0-3 3v3a3 3 0 0 0 3 3"/>
        <path d="M18 9a3 3 0 0 1 3 3v3a3 3 0 0 1-3 3"/><path d="M12 3v18"/><path d="M6 9v9"/><path d="M18 9v9"/>
      </svg>
    </div>
    <h1>AI 提示词生成器</h1>
    <p>输入你的需求，一键生成高质量 Prompt</p>
  </div>
  <div class="card">
    <div class="form-group">
      <label class="form-label" for="inp">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        你的需求
      </label>
      <textarea id="inp" placeholder="请输入你的需求，例如：&#10;帮我写一个减肥短视频脚本" rows="4"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label" for="typeSel">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/>
        </svg>
        提示词类型
      </label>
      <div class="select-wrap">
        <select id="typeSel">
          <option value="chatgpt">ChatGPT</option>
          <option value="jimeng">即梦AI</option>
          <option value="midjourney">Midjourney</option>
          <option value="jianying">剪映</option>
          <option value="doubao">豆包AI</option>
        </select>
      </div>
    </div>
    <button class="btn btn-full" id="genBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3a3 3 0 0 0-3 3v12a3 3 0 0 0 3 3"/><path d="M6 9a3 3 0 0 0-3 3v3a3 3 0 0 0 3 3"/>
        <path d="M18 9a3 3 0 0 1 3 3v3a3 3 0 0 1-3 3"/><path d="M12 3v18"/><path d="M6 9v9"/><path d="M18 9v9"/>
      </svg>
      <span id="btnText">生成提示词</span>
    </button>
  </div>
  <div class="result-card" id="resultCard">
    <div class="result-header">
      <div class="result-header-left"><div class="result-dot"></div><span>生成结果</span></div>
      <div class="result-actions">
        <button class="icon-btn" id="copyBtn" title="复制">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="result-body" id="resultBody"></div>
    <div style="padding:0 24px 20px"><div class="regen-row">
  <button class="btn btn-ghost" id="copyBtn2" style="flex:1;">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
      <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
    </svg>
    一键复制
  </button>
  <button class="btn btn-ghost" id="regenBtn" style="flex:1;">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="1 4 1 10 7 10"/>
      <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
    </svg>
    重新生成
  </button>
</div></div>
  </div>
  <div class="footer">内置 <span>20</span> 个高质量模板 · 无需联网</div>
</div><script>
const T={chatgpt:[{p:/减肥|瘦身|健身|减脂|运动|身材|塑形/i,t:i=>'你是一位资深健身教练和营养师。请根据以下需求，为我设计一份详细的计划。\n\n【用户需求】'+i+'\n\n## 一、核心目标\n明确列出主要目标。\n\n## 二、饮食方案\n- 每日热量建议\n- 三餐搭配示例\n- 推荐食材清单\n\n## 三、运动计划\n- 每周训练频率\n- 具体动作与组数\n- 有氧与力量分配\n\n## 四、注意事项\n- 常见错误与避坑\n- 恢复与睡眠建议'},{p:/脚本|短视频|视频|拍摄|镜头|剧情|抖音/i,t:i=>'你是一位专业短视频编导。请根据以下需求创作完整的视频脚本。\n\n【需求描述】'+i+'\n\n## 视频信息\n- 时长：建议时长\n  - 风格：轻松/专业/搞笑等\n\n## 分镜脚本\n| 序号 | 镜头 | 画面描述 | 台词/旁白 | 字幕 | 时长 |\n|------|------|----------|-----------|------|------|\n| 1 | 近景 | …… | …… | …… | 3s |\n\n## 拍摄建议\n- 设备与灯光\n- 场景布置\n- 关键动作指导\n\n## 发布文案\n- 标题建议（3个）\n- 话题标签（5-8个）'},{p:/文案|推广|营销|广告|产品|卖点|宣传/i,t:i=>'你是一位资深文案策划专家。请根据以下需求创作营销文案。\n\n【需求描述】'+i+'\n\n## 核心卖点提炼\n列出 3-5 个最打动人的卖点。\n\n## 标题方案（5 个）\n每个标题附简短说明。\n\n## 正文文案\n- 开头（吸引注意）\n- 中间（痛点+解决方案）\n- 结尾（行动号召）\n\n## 不同平台适配\n- 小红书版本（口语化、带 emoji）\n- 公众号版本（深度、专业）\n- 朋友圈版本（短小精悍）'},{p:/编程|代码|开发|bug|调试|技术|功能|实现/i,t:i=>'你是一位资深软件工程师。请根据以下需求提供技术解决方案。\n\n【需求描述】'+i+'\n\n## 需求分析\n拆解核心功能点。\n\n## 技术方案\n- 推荐技术栈\n- 架构设计思路\n- 关键代码示例\n\n## 实现步骤\n1. 环境准备\n2. 分步实现（附代码）\n3. 测试验证\n\n## 注意事项\n- 性能优化点\n- 安全考虑\n- 边界情况处理'}],jimeng:[{p:/风景|自然|森林|海洋|天空|日落|日出|山川/i,t:i=>'根据你的描述生成即梦AI绘画提示词：\n\n【需求】'+i+'\n\n## 画面主体\n- 核心景物：_____\n- 氛围/光线：_____\n- 色彩基调：_____\n\n## 详细描述\n（展开 2-3 句画面描述）\n\n## 风格标签\n写实摄影、8K、超细节、自然光线、景深效果、电影感构图\n\n## 参数建议\n- 比例：16:9\n- 风格：写实/艺术\n- 光照：黄金时刻\n\n## 英文 Prompt\nCinematic shot of '+['breathtaking landscape','serene nature scene','majestic natural wonder','peaceful outdoor scenery'][~~(Math.random()*4)]+', '+['golden hour lighting, warm tones','dramatic clouds, soft diffused light','misty morning, ethereal atmosphere','vibrant sunset, rich colors'][~~(Math.random()*4)]+', ultra-detailed, 8K, photorealistic, depth of field, atmospheric --ar 16:9 --style raw'},{p:/角色|人物|人像|头像|肖像|动漫|二次元/i,t:i=>'根据你的描述生成即梦AI人物提示词：\n\n【需求】'+i+'\n\n## 角色设定\n- 外貌特征：_____\n- 服装风格：_____\n- 表情/姿态：_____\n\n## 风格标签\n人像摄影、柔光、浅景深、细腻肌肤、高清细节\n\n## 参数建议\n- 比例：3:4\n- 风格：人像/艺术\n- 光照：柔光箱 + 侧逆光\n\n## 英文 Prompt\nPortrait of a beautiful character, '+['delicate features, soft smile, warm ambient lighting','sharp features, confident gaze, dramatic side lighting','gentle expression, flowing hair, golden hour glow','mysterious look, intricate clothing details, cinematic lighting'][~~(Math.random()*4)]+', professional portrait, 85mm lens, shallow depth of field, bokeh, highly detailed, ultra HD --ar 3:4'},{p:/海报|封面|banner|宣传图|广告图|视觉|设计/i,t:i=>'根据你的描述生成即梦AI海报提示词：\n\n【需求】'+i+'\n\n## 画面构成\n- 主体元素：_____\n- 背景环境：_____\n- 色彩方案：_____\n\n## 设计风格\n（描述整体视觉风格）\n\n## 风格标签\n平面设计、商业海报、高清渲染、干净背景、专业构图\n\n## 英文 Prompt\nProfessional poster design, '+['minimalist composition, clean lines, bold typography','futuristic aesthetic, neon accents, dark background','elegant and luxurious, gold accents, soft gradients','playful and vibrant, geometric shapes, contrasting colors'][~~(Math.random()*4)]+', high-end graphic design, 8K, sharp details, commercial quality --ar 2:3'},{p:/概念|科幻|奇幻|赛博|未来|机械|龙|魔法/i,t:i=>'根据你的描述生成即梦AI概念艺术提示词：\n\n【需求】'+i+'\n\n## 世界观设定\n- 背景时代：_____\n- 核心概念：_____\n- 氛围基调：_____\n\n## 艺术风格\n概念艺术、电影级质感、史诗场景、动态构图、戏剧性光影\n\n## 英文 Prompt\nEpic concept art of '+['a futuristic cyberpunk cityscape at night, neon lights reflecting on wet streets','a mystical fantasy realm with floating islands and ancient ruins','a biomechanical creature emerging from shadows, intricate details','a colossal space station orbiting an alien planet, starfield background'][~~(Math.random()*4)]+', cinematic lighting, volumetric fog, ultra-detailed, 8K, trending on ArtStation, dramatic atmosphere --ar 16:9'}],midjourney:[{p:/摄影|写实|人像|街拍|纪实|胶片|肖像/i,t:i=>'根据你的描述生成 Midjourney 写实摄影提示词：\n\n【需求】'+i+'\n\n## 画面描述\n（光线、构图、色调）\n\n## 核心参数\n- 主体：_____\n- 环境：_____\n- 光线：_____\n\n## 英文 Prompt\n'+['a candid street portrait of an elderly person with weathered features','a fashion portrait of a model in natural light, soft shadows','a documentary style photo of a bustling market scene','a cinematic portrait with dramatic chiaroscuro lighting'][~~(Math.random()*4)]+', '+['shot on Leica M6, 35mm f/1.4','Hasselblad medium format, 80mm f/2.8','Fujifilm GFX, 50mm f/1.2','Sony A7R V, 85mm f/1.4'][~~(Math.random()*4)]+', Kodak Portra 400 film grain, natural skin tones, shallow depth of field, professional, highly detailed, 8K --ar 4:5 --style raw --v 6'},{p:/场景|环境|室内|建筑|城市|空间|地点/i,t:i=>'根据你的描述生成 Midjourney 场景提示词：\n\n【需求】'+i+'\n\n## 空间描述\n- 空间类型：_____\n- 风格时期：_____\n- 材质细节：_____\n- 光线氛围：_____\n\n## 英文 Prompt\n'+['a minimalist modern villa interior with floor-to-ceiling windows, warm wood accents','a brutalist concrete building exterior, dramatic overcast sky, reflection in puddles','a cozy Japanese-style tea room, tatami mats, soft paper lantern light','a futuristic smart home living room, holographic displays, ambient blue lighting'][~~(Math.random()*4)]+', '+['architectural photography, wide angle lens, geometric composition','interior design photography, natural light, warm atmosphere','architectural digest style, symmetrical framing, soft shadows','minimalist aesthetic, clean lines, atmospheric perspective'][~~(Math.random()*4)]+', ultra-detailed, 8K, photorealistic, professional --ar 16:9 --v 6'},{p:/产品|商品|实物|渲染|3C|数码|包装/i,t:i=>'根据你的描述生成 Midjourney 产品渲染提示词：\n\n【需求】'+i+'\n\n## 产品描述\n- 产品类型：_____\n- 材质：_____\n- 颜色：_____\n\n## 英文 Prompt\n'+['a sleek modern smartphone on a white marble surface','a luxury perfume bottle with gold accents, backlit with warm glow','wireless earphones in a minimalist charging case, floating display','a mechanical keyboard with custom keycaps, dramatic side lighting'][~~(Math.random()*4)]+', '+['commercial product photography, soft studio lighting, clean white background','luxury product shot, rim lighting, dark moody background','minimalist product display, natural window light, subtle shadows','high-end advertising style, dramatic lighting, reflective surface'][~~(Math.random()*4)]+', 8K, ultra-detailed, sharp focus, macro detail, professional commercial --ar 4:3 --v 6'},{p:/插画|卡通|扁平|矢量|手绘|涂鸦|绘本/i,t:i=>'根据你的描述生成 Midjourney 插画提示词：\n\n【需求】'+i+'\n\n## 插画类型\n- 风格：_____\n- 色系：_____\n- 场景：_____\n\n## 英文 Prompt\n'+["a whimsical children's book illustration of a fox in an enchanted forest","a flat vector illustration of a modern city park with diverse people","a hand-drawn botanical illustration, delicate linework, watercolor texture","a cute kawaii character in pastel colors, clean line art, digital painting"][~~(Math.random()*4)]+', '+['soft pastel palette, magical atmosphere, detailed background','bold geometric shapes, vibrant colors, modern vector style','traditional ink and watercolor style, paper texture, organic lines','anime-inspired digital art, cel shading, expressive features'][~~(Math.random()*4)]+', trending on ArtStation, detailed, beautiful composition --ar 3:4 --v 6'}],jianying:[{p:/美食|做菜|烹饪|烘焙|食谱|厨房/i,t:i=>'根据你的需求生成剪映短视频拍摄与剪辑方案：\n\n【需求】'+i+'\n\n## 视频概览\n- 风格：治愈美食 / 快节奏教程\n- 建议时长：30-60 秒\n- 背景音乐：轻快木吉他 / Lo-fi\n\n## 分镜脚本\n| 序号 | 画面 | 运镜 | 音效 | 字幕 | 时长 |\n|------|------|------|------|------|------|\n| 1 | 食材准备全貌 | 缓慢推近 | 切菜音效 | 食材清单 | 3s |\n| 2 | 关键步骤特写 | 固定机位 | 烹饪声 | 步骤说明 | 5s |\n| 3 | 成品展示 | 环绕运镜 | 嚼碎音 | 菜名 | 4s |\n| 4 | 开吃画面 | 拉远 | 满足声 | 结束语 | 3s |\n\n## 剪辑要点\n- 转场：叠化转场\n- 调色：暖色温 +10，饱和度 +5\n- 变速：操作部分 1.5x，展示部分 0.8x\n\n## 发布建议\n- 封面设计：成品图 + 大字标题\n- 话题标签：#美食教程 #烹饪 #治愈系'},{p:/旅行|vlog|出游|旅游|记录|探店|打卡/i,t:i=>'根据你的需求生成剪映旅行 Vlog 剪辑方案：\n\n【需求】'+i+'\n\n## 视频概览\n- 风格：文艺旅行 / 探店打卡\n- 建议时长：60-90 秒\n- 背景音乐：轻快民谣 / 氛围电子\n\n## 分镜脚本\n| 序号 | 画面 | 运镜 | 音效 | 字幕 | 时长 |\n|------|------|------|------|------|------|\n| 1 | 出发场景 | 跟拍 | 环境声 | 地点 | 4s |\n| 2 | 沿途风景 | 平移 | 音乐起 | 心情 | 5s |\n| 3 | 到达目的 | 环绕 | 惊叹声 | 地名 | 3s |\n| 4 | 细节特写 | 微距 | 环境音 | 感受 | 4s |\n| 5 | 个人镜头 | 自拍 | 同期声 | 感言 | 5s |\n\n## 剪辑要点\n- 转场：摇晃转场\n- 调色：青橙色调，饱和度 +3\n- 特效：阳光光晕\n\n## 封面建议\n拼图风格：3-4 张精选图片 + 地点名称'},{p:/健身|运动|锻炼|跟练|打卡|体能|燃脂/i,t:i=>'根据你的需求生成剪映健身跟练视频方案：\n\n【需求】'+i+'\n\n## 视频概览\n- 类型：跟练教程\n- 建议时长：15-30 分钟\n- 背景音乐：节奏感强 EDM / Hip-Hop\n\n## 分镜脚本\n| 序号 | 动作名 | 画面 | 计时 | 动作要点字幕 | 时长 |\n|------|--------|------|------|-------------|------|\n| \n\n**方案五 | 反问风**\n🤔 _____\n（引人思考/互动）\n\n## 配图建议\n- 照片风格：_____\n- 数量建议：3-4 张 / 九宫格\n\n## 发布时间建议\n- 最佳时间：12:00-13:00 / 22:00-23:00\n\n## 互动引导\n- 结尾添加一个问题引导评论'}],F:{chatgpt:i=>'以下是根据你的需求生成的 ChatGPT 高质量提示词：\n\n## 角色设定\n你是一位专业领域的资深专家，拥有丰富的实战经验。\n\n## 任务目标\n'+i+'\n\n## 输出要求\n1. 结构清晰，分点阐述\n2. 提供可立即执行的方案\n3. 包含具体示例或数据支撑\n4. 语言专业但不晦涩',jimeng:i=>'根据你的描述生成即梦AI绘画提示词：\n\n【主题】'+i+'\n\n## 画面描述\n（请根据需求构思画面主体、环境、光线与色彩）\n\n## 风格标签\n数字艺术、高清渲染、鲜艳色彩、梦幻氛围、精致细节\n\n## 英文 Prompt\nDigital art of '+i+', vibrant colors, dreamy atmosphere, ultra-detailed, high quality rendering, artistic composition, soft lighting --ar 1:1',midjourney:i=>'根据你的描述生成 Midjourney 提示词：\n\nPrompt: '+i+', high quality, detailed, beautiful composition, professional --ar 16:9 --v 6',jianying:i=>'根据你的需求生成剪映视频剪辑方案：\n\n【需求】'+i+'\n\n## 视频概览\n- 风格：根据内容确定\n- 建议时长：30-90 秒\n\n## 剪辑流程\n1. 素材整理与筛选\n2. 粗剪：按时间线排列\n3. 精剪：调整节奏、添加转场\n4. 调色：统一色调\n5. 添加音乐与音效\n6. 字幕与特效\n7. 导出发布\n\n## 核心建议\n- 前 3 秒是关键\n- 保持节奏紧凑\n- 添加品牌标识',doubao:i=>'以下是根据你的需求生成的豆包 AI 内容：\n\n【需求】'+i+'\n\n## 内容方案\n（根据你的具体需求，为你定制内容）\n\n## 创作建议\n1. 明确目标受众\n2. 突出核心信息\n3. 使用有感染力的语言\n4. 添加互动引导\n\n## 优化方向\n- 标题要抓人眼球\n- 内容要有价值密度\n- 结尾要引导互动'}};
const $=id=>document.getElementById(id),inp=$('inp'),ts=$('typeSel'),gb=$('genBtn'),bt=$('btnText'),rc=$('resultCard'),rb=$('resultBody'),cb=$('copyBtn'),cb2=$('copyBtn2'),rg=$('regenBtn');
const tm={chatgpt:'ChatGPT',jimeng:'即梦AI',midjourney:'Midjourney',jianying:'剪映',doubao:'豆包AI'};
function gen(){
  const v=inp.value.trim(),tp=ts.value;
  if(!v)return st('请输入你的需求');
  gb.disabled=1;bt.textContent='生成中...';
  const sv=gb.querySelector('svg');sv.style.display='none';
  const sp=document.createElement('div');sp.className='spinner';sp.id='sp';gb.appendChild(sp);
  setTimeout(()=>{
    const tpls=T[tp];let m=null;
    for(const t of tpls)if(t.p.test(v)){m=t.t(v);break}
    if(!m)m=T.F[tp](v);
    rb.innerHTML='<span class="tag">'+tm[tp]+'</span>\n'+m;
    rc.classList.remove('visible');void rc.offsetWidth;rc.classList.add('visible');
    gb.disabled=0;bt.textContent='生成提示词';sv.style.display='';
    const sp2=$('sp');if(sp2)sp2.remove();
    rc.scrollIntoView({behavior:'smooth',block:'start'});
  },500);
}
function cp(){
  const t=rb.innerText;if(!t)return;
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(()=>{
    cb.classList.add('copied');cb.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>';st('复制成功！');
    setTimeout(()=>{cb.classList.remove('copied');cb.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';},2000);
  }).catch(()=>{const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);st('复制成功！');});
}

}
function st(m){const t=$('toast');t.textContent=m;t.className='toast';void t.offsetWidth;t.classList.add('show');clearTimeout(t._timer);t._timer=setTimeout(()=>t.classList.remove('show'),2200)}
gb.addEventListener('click',gen);rg.addEventListener('click',gen);cb.addEventListener('click',cp);cb2.addEventListener('click',cp);
inp.addEventListener('keydown',e=>{(e.ctrlKey||e.metaKey)&&e.key==='Enter'&&(e.preventDefault(),gen())});
</script>
